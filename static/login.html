<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Masuk — Bel Madrasah</title>
  <meta name="theme-color" content="#0c1a17">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0c1a17;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 25% 25%, rgba(15, 118, 110, .15), transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(15, 118, 110, .08), transparent 50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, .4), 0 4px 16px rgba(0, 0, 0, .2);
      padding: 40px 36px;
      width: min(380px, 100%);
      animation: pop .35s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translateY(16px) scale(.97);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 54px;
      height: 54px;
      border-radius: 17px;
      background: #f0fdf9;
      border: 1px solid #ccfbef;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .logo-mark svg {
      width: 24px;
      height: 24px;
      stroke: #0f766e;
    }

    .logo h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #1c1917;
      letter-spacing: -.02em;
    }

    .logo p {
      font-size: 12px;
      color: #a8a29e;
      margin-top: 4px;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 12.5px;
      font-weight: 500;
      margin-bottom: 18px;
      display: none;
      line-height: 1.4;
    }

    .fg {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #78716c;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #e7e5e4;
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      color: #1c1917;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      background: #fff;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .1);
    }

    input::placeholder {
      color: #d6d3d1;
    }

    .btn {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      background: #0f766e;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(15, 118, 110, .3);
      transition: background .2s, transform .1s;
      letter-spacing: -.01em;
    }

    .btn:hover {
      background: #0d6460;
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn:disabled {
      background: #d6d3d1;
      box-shadow: none;
      cursor: not-allowed;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #d6d3d1;
      margin-top: 24px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </div>
      <h1>Bel Madrasah</h1>
      <p>MTsN 1 Pandeglang</p>
    </div>

    <div class="error" id="errMsg"></div>

    <div class="fg">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Masuk</button>
    <div class="footer">Sistem Bel Otomatis Madrasah</div>
  </div>

  <script>
    async function login() {
      const btn = document.getElementById("loginBtn");
      const err = document.getElementById("errMsg");
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value;
      if (!u || !p) { showErr("Username dan password harus diisi"); return; }
      btn.disabled = true;
      btn.textContent = "Memproses...";
      err.style.display = "none";
      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: u, password: p }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        window.location.href = "/";
      } catch (e) {
        showErr(e.message);
        btn.disabled = false;
        btn.textContent = "Masuk";
      }
    }

    function showErr(msg) {
      const el = document.getElementById("errMsg");
      el.textContent = msg;
      el.style.display = "block";
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => { }));
    }
  </script>
</body>

</html>
