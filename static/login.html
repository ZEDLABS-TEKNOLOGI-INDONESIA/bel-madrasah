<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bel Madrasah</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px #0002;
      padding: 36px 32px;
      width: min(380px, 92vw)
    }

    .logo {
      text-align: center;
      margin-bottom: 28px
    }

    .logo svg {
      display: block;
      margin: 0 auto 12px
    }

    .logo h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a202c
    }

    .logo p {
      font-size: .83rem;
      color: #64748b;
      margin-top: 3px
    }

    .form-group {
      margin-bottom: 16px
    }

    label {
      display: block;
      font-size: .83rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: .92rem;
      outline: none;
      transition: border .15s
    }

    input:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px #1a56db18
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 6px
    }

    .btn:hover {
      background: #1e40af
    }

    .btn:disabled {
      background: #93c5fd;
      cursor: not-allowed
    }

    .error {
      background: #fee2e2;
      color: #dc2626;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: .85rem;
      margin-bottom: 14px;
      display: none
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="1.5">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <h1>Bel Madrasah</h1>
      <p>MTsN 1 Pandeglang</p>
    </div>
    <div class="error" id="errorMsg"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Masuk</button>
  </div>
  <script>
    async function login() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (!u || !p) { showError('Username dan password harus diisi'); return; }
      btn.disabled = true;
      btn.textContent = 'Masuk...';
      err.style.display = 'none';
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error);
        window.location.href = '/';
      } catch (e) {
        showError(e.message);
        btn.disabled = false;
        btn.textContent = 'Masuk';
      }
    }
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>

</html>
