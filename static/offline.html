<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2c3e4f">
  <title>Offline - Bel Madrasah</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(150deg, #2c3e4f 0%, #1e2c38 100%);
      color: #f3ede4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      text-align: center;
      max-width: 380px;
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
    }

    .icon svg {
      width: 30px;
      height: 30px;
      stroke: #f3c98a;
    }

    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -.01em;
    }

    p {
      font-size: 13.5px;
      color: #b9c6d2;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    button {
      font-family: inherit;
      background: #f3c98a;
      color: #2c3e4f;
      border: none;
      padding: 11px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }

    button:hover {
      opacity: .9;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="icon">
      <svg fill="none" stroke-width="1.75" viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        <path d="M3 3l18 18" />
      </svg>
    </div>
    <h1>Tidak Ada Koneksi</h1>
    <p>Halaman ini tidak tersedia secara offline. Periksa koneksi jaringan ke server Bel Madrasah, lalu coba lagi.</p>
    <button onclick="window.location.reload()">Coba Lagi</button>
  </div>
</body>

</html>
